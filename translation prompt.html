                        result = result.replace(regex, value);
                    });
                    output.value = result;
                }

                inputs.forEach(input => input.addEventListener('input', updateOutput));
                // Add change listener specifically for selects and checkboxes to ensure rapid firing
                inputs.forEach(input => input.addEventListener('change', updateOutput));

                copyBtn.addEventListener('click', () => {
                    output.select();
                    output.setSelectionRange(0, 99999);

                    try {
                        const successful = document.execCommand('copy');
                        if(successful) {
                            const originalHTML = copyBtn.innerHTML;
                            copyBtn.innerHTML = '<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!';
                            copyBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
                            copyBtn.classList.replace('hover:bg-blue-700', 'hover:bg-emerald-700');
                            copyBtn.classList.replace('ring-blue-500', 'ring-emerald-500');
                            
                            setTimeout(() => {
                                copyBtn.innerHTML = originalHTML;
                                copyBtn.classList.replace('bg-emerald-600', 'bg-blue-600');
                                copyBtn.classList.replace('hover:bg-emerald-700', 'hover:bg-blue-700');
                                copyBtn.classList.replace('ring-emerald-500', 'ring-blue-500');
                            }, 2000);
                        } else {
                            alert('Failed to copy. Please select and copy manually.');
                        }
                    } catch (err) {
                        alert('Copy function is not supported in this browser.');
                    }
                    
                    window.getSelection().removeAllRanges();
                    output.blur();
                });

                updateOutput();
            
    </script>
</body>
</html>
